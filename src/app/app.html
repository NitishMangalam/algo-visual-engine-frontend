<div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
  <h1 style="color: #2c3e50;">🚀 Algorithm Visualizer</h1>

  <div style="margin-top: 30px;">
    <h3>Trie Search (Autocomplete)</h3>
    <input
      type="text"
      [(ngModel)]="searchPrefix"
      (input)="onType()"
      placeholder="Type a name..."
      style="padding: 12px; width: 300px; border: 2px solid #3498db; border-radius: 8px;"
    >

    <div style="margin-top: 20px;">
      <div *ngFor="let s of suggestions"
           style="background: #ecf0f1; padding: 10px; margin: 5px auto; width: 280px; border-radius: 4px; border-left: 5px solid #3498db;">
        <strong>{{ s }}</strong>
      </div>
    </div>
  </div>
</div>
<hr style="margin: 40px 0; border: 1px solid #ddd;">

<div style="margin-top: 30px;">
  <h3>Graph: Shortest Path Finder</h3>
  <div style="display: flex; justify-content: center; gap: 10px;">
    <input [(ngModel)]="startNode" placeholder="Start City (e.g., A)" style="padding: 10px; width: 140px;">
    <input [(ngModel)]="endNode" placeholder="End City (e.g., D)" style="padding: 10px; width: 140px;">
    <button (click)="findPath()" style="padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; border-radius: 5px;">
      Find Path
    </button>
  </div>

  <div *ngIf="path.length > 0" style="margin-top: 20px;">
    <p><strong>Route:</strong></p>
    <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
      <span *ngFor="let city of path; let last = last">
        <span style="background: #2ecc71; color: white; padding: 8px 15px; border-radius: 20px;">{{ city }}</span>
        <span *ngIf="!last"> ➔ </span>
      </span>
    </div>
  </div>
</div>
<hr style="margin: 40px 0; border: 1px solid #ddd;">

<div style="margin-top: 30px; padding-bottom: 50px;">
  <h3>Dynamic Programming: Knapsack Optimizer</h3>
  <input type="number" [(ngModel)]="capacity" style="padding: 10px; width: 100px;">
  <button (click)="solveKnapsack()" style="padding: 10px 20px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer;">
    Optimize Value

  </button>

  <div *ngIf="knapsackResult" style="margin-top: 20px; color: #e67e22; font-weight: bold;">
    {{ knapsackResult }}
  </div>
</div>
